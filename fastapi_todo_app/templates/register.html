<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация — Менеджер задач</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', sans-serif;
        background: #0a0a0f;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        color: #e0e0e0;
    }

    .auth-card {
        background: #1a1a2e;
        padding: 40px 45px;
        border-radius: 20px;
        border: 1px solid #6c3cb0;
        box-shadow: 0 8px 30px rgba(108, 60, 176, 0.2);
        width: 100%;
        max-width: 400px;
        text-align: center;
    }

    .auth-card h1 {
        color: #c084fc;
        margin-bottom: 25px;
        font-weight: 700;
        font-size: 2rem;
    }

    .auth-card input {
        width: 100%;
        padding: 12px 16px;
        margin: 10px 0;
        border-radius: 12px;
        border: 1px solid #3a3a5a;
        background: #0f0f1a;
        color: #e0e0e0;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.3s ease;
    }

    .auth-card input:focus {
        border-color: #6c3cb0;
        box-shadow: 0 0 0 3px rgba(108, 60, 176, 0.2);
    }

    .auth-card input::placeholder {
        color: #6a6a80;
    }

    .auth-card button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border-radius: 50px;
        border: none;
        background: linear-gradient(135deg, #6c3cb0 0%, #8a4fd4 100%);
        color: #fff;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 20px rgba(108, 60, 176, 0.3);
    }

    .auth-card button:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 30px rgba(108, 60, 176, 0.5);
    }

    .auth-card p {
        margin-top: 20px;
        font-size: 0.9rem;
        color: #a0a0b0;
    }

    .auth-card a {
        color: #c084fc;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s ease;
    }

    .auth-card a:hover {
        color: #8a4fd4;
        text-decoration: underline;
    }

    .error {
        color: #ff6b6b;
        font-weight: 600;
        margin-bottom: 15px;
        padding: 10px 15px;
        background: rgba(255, 107, 107, 0.1);
        border-radius: 10px;
        border: 1px solid rgba(255, 107, 107, 0.2);
        font-size: 0.9rem;
    }

    /* Password hint */
    .hint {
        font-size: 0.75rem;
        color: #6a6a80;
        text-align: left;
        margin-top: 5px;
        margin-bottom: 5px;
        padding-left: 5px;
    }
</style>
</head>
<body>

<div class="auth-card">
    <h1>📝 Регистрация</h1>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/register">
        <input type="text" name="username" placeholder="Имя пользователя" required>
        <input type="password" name="password" placeholder="Пароль" minlength="4" required>
        <div class="hint">🔒 Рекомендуется минимум 4 символа</div>
        <button type="submit">Создать аккаунт</button>
    </form>

    <p>Уже есть аккаунт? <a href="/login">Войти здесь</a></p>
</div>

</body>
</html>
